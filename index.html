<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo| Login</title>
    <!-- tailwind link  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--tailwind + daisy link   -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen max-w-md mx-auto border-4">
    <div class="">
        <img class="logo mx-auto pt-[200px] border-4" src="assets/Logo-full.png" alt="">
    </div>

    <div class="hero border-4 pt-[32px]">
          <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow">
      <div class="card-body font-bold text-black border-radius bg-red">
        <fieldset class="fieldset">
          <label class="label" >Mobile Number</label>
          <input type="email" id="myId" class="input" placeholder="Enter Your Number" />
          <label class="label">4 Digit Pin</label>
          <input type="password" id="mypass" class="input" placeholder="Enter 4 Digit Pin" />
          <button id="loginbtn" class="btn btn-neutral mt-4">Login</button>
        </fieldset>
      </div>
    </div>
    </div>
</body>
<script src="script/login.js"></script>

</html>
